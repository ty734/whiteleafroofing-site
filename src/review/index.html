<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>How Did We Do? | White Leaf Roofing</title>
<meta name="description" content="Tell Andy how your roofing job went. Two questions, thirty seconds.">
<link rel="canonical" href="https://whiteleafroofing.com/review/">
<meta name="robots" content="noindex, follow">
<link rel="icon" href="/assets/img/favicon.webp" type="image/webp">
<link rel="preload" href="/assets/fonts/anton-400.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/assets/css/main.css">
<style>
  .rate-row { display: flex; gap: 10px; margin: 12px 0 8px; }
  .rate-btn {
    width: 56px; height: 56px; font-size: 22px; font-weight: 700;
    background: #fff; color: var(--ink, #1C241D);
    border: 2px solid rgba(28,36,29,.25); border-radius: 10px; cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s;
  }
  .rate-btn:hover { border-color: var(--gold, #DEA816); transform: translateY(-2px); }
  .rate-btn[aria-pressed="true"] { background: var(--gold, #DEA816); border-color: var(--gold, #DEA816); color: #1C241D; }
  .rate-scale { display: flex; justify-content: space-between; max-width: 320px; font-size: 13px; opacity: .7; }
  @media (max-width: 480px) { .rate-btn { width: 48px; height: 48px; } }

  /* Review form reuses the site's .lead-form field styling (panel bg, 16.5px text,
     proper padding). Labels stay sentence-case and readable for this customer page. */
  #review-form label { text-transform: none; letter-spacing: 0; font-size: 15px; font-weight: 600; color: var(--bone); }
  #review-form .rate-q { font-size: 17px; }
  #review-form .rate-block { gap: 0; }
</style>
</head>
<body>
<!-- @header -->

<section class="page-hero" style="padding: 90px 0 60px;">
  <div class="wrap" style="max-width: 720px;">
    <p class="eyebrow">Thirty seconds, two questions</p>
    <h1 class="display">How did <em>we do?</em></h1>
    <p class="sub">Thanks for letting me work on your roof. I read every one of these myself, and this is how I keep White Leaf honest.</p>

    <form id="review-form" class="lead-form" novalidate>
      <input type="hidden" name="t" value="">
      <p class="hp" aria-hidden="true"><label>Company <input type="text" name="company" tabindex="-1" autocomplete="off"></label></p>

      <div class="rate-block">
        <label class="rate-q">How likely are you to recommend White Leaf to a friend or neighbor?</label>
        <div class="rate-row" role="radiogroup" aria-label="Rating from 1 to 5">
          <button type="button" class="rate-btn" data-r="1" aria-pressed="false">1</button>
          <button type="button" class="rate-btn" data-r="2" aria-pressed="false">2</button>
          <button type="button" class="rate-btn" data-r="3" aria-pressed="false">3</button>
          <button type="button" class="rate-btn" data-r="4" aria-pressed="false">4</button>
          <button type="button" class="rate-btn" data-r="5" aria-pressed="false">5</button>
        </div>
        <div class="rate-scale"><span>Not likely</span><span>Absolutely</span></div>
      </div>

      <label>Anything you want me to know?
        <textarea name="feedback" rows="5" maxlength="3000" placeholder="What went well, what didn't, what I should do differently."></textarea>
      </label>

      <label>Your name <span class="opt">(optional)</span>
        <input type="text" name="name" autocomplete="name">
      </label>

      <p class="form-error" role="alert" hidden></p>
      <button type="submit" class="btn btn-gold btn-lg">Send to Andy</button>
      <p class="form-note">Goes straight to Andy. Not a mailing list.</p>
    </form>

    <div id="review-done" hidden>
      <h2 class="display" style="font-size: clamp(28px, 3.5vw, 42px); margin-top: 30px;">Thank you.</h2>
      <p class="sub" id="done-msg"></p>
      <div class="hero-ctas" style="margin-top: 24px;">
        <a id="done-google" class="btn btn-gold btn-lg" href="#" hidden>Leave the review on Google</a>
        <a class="btn btn-ghost btn-lg" href="/">Back to the homepage</a>
      </div>
    </div>
  </div>
</section>

<script>
(function () {
  // White Leaf Roofing GBP (place_id ChIJufn_CWuzK4cRUoEoVQCIB2Q, 3210 S Gilbert Rd #1 Chandler).
  var GOOGLE_REVIEW_URL = "https://search.google.com/local/writereview?placeid=ChIJufn_CWuzK4cRUoEoVQCIB2Q";

  var form = document.getElementById('review-form');
  var done = document.getElementById('review-done');
  var doneMsg = document.getElementById('done-msg');
  var doneGoogle = document.getElementById('done-google');
  var errEl = form.querySelector('.form-error');
  var rating = 0;
  form.querySelector('[name=t]').value = Date.now();

  form.querySelectorAll('.rate-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      rating = Number(btn.dataset.r);
      form.querySelectorAll('.rate-btn').forEach(function (b) {
        b.setAttribute('aria-pressed', b === btn ? 'true' : 'false');
      });
      errEl.hidden = true;
    });
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!rating) {
      errEl.textContent = 'Pick a number from 1 to 5 first.';
      errEl.hidden = false;
      return;
    }
    var payload = {
      rating: rating,
      feedback: form.feedback.value,
      name: form.name.value,
      company: form.company.value,
      t: Number(form.querySelector('[name=t]').value)
    };
    var btn = form.querySelector('[type=submit]');
    btn.disabled = true; btn.textContent = 'Sending...';
    fetch('/api/review/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(function () { /* show thanks regardless; email failure is logged server-side */ })
      .then(function () {
        form.hidden = true;
        done.hidden = false;
        if (rating >= 4 && GOOGLE_REVIEW_URL) {
          doneMsg.innerHTML = 'That means a lot. Reviews are how a one-man shop competes with the big companies. <strong>Would you take one more minute and say the same thing on Google?</strong>';
          doneGoogle.href = GOOGLE_REVIEW_URL;
          doneGoogle.hidden = false;
          setTimeout(function () { window.location.href = GOOGLE_REVIEW_URL; }, 3500);
        } else if (rating >= 4) {
          doneMsg.textContent = 'That means a lot. I appreciate you taking the time.';
        } else {
          doneMsg.textContent = "I'm sorry it wasn't right. Your note just hit my inbox and I'll call you personally to fix it. If you'd rather not wait, call or text me at 480-363-2898.";
        }
      });
  });
})();
</script>

<!-- @footer -->
<!-- @callbar -->
</body>
</html>
